<!doctype html>
<html lang="zh-Hant">
<head>

  <style>
    :root{--bg:#edf6ff;--bg2:#dceeff;--side:#f7fbff;--panel:#ffffff;--line:#c9dbef;--text:#14324c;--muted:#6c88a3;--head:#10253c;--accent:#0b78d1;--accent2:#0560ac;--soft:#d9efff;--ok:#1fc97a;--warn:#f0b94c;--bad:#ef6d74;--shadow:0 16px 36px rgba(69,108,145,.14)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at top left,rgba(121,189,255,.38),transparent 24%),linear-gradient(180deg,#f5fbff 0,#ebf4fb 52%,#e6f1fb 100%);font:14px/1.5 "Segoe UI","Noto Sans TC","PingFang TC",sans-serif}
    .app{min-height:100vh;display:grid;grid-template-columns:290px minmax(0,1fr)}.side{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:16px;padding:18px 16px;background:rgba(247,251,255,.96);border-right:1px solid rgba(184,205,229,.75)}
    .brand{display:flex;align-items:center;gap:12px;padding:10px 12px}.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,#fff 0 23%,transparent 23%),linear-gradient(135deg,#5b82ff 0 55%,#fff 55% 69%,#2fd4ff 69%);box-shadow:0 8px 20px rgba(39,127,203,.28)}.brand b{font-size:20px;color:var(--head)}

    .footer{margin-top:auto;display:grid;gap:12px;padding-top:10px;border-top:1px solid rgba(184,205,229,.6)}.ver{padding:12px 14px;border-radius:14px;border:1px solid rgba(11,120,209,.22);background:rgba(217,239,255,.8);font-size:12px;font-weight:800;color:var(--accent2)}

    .menu{display:none;position:absolute;left:10px;right:10px;bottom:66px;padding:10px;border-radius:18px;background:rgba(255,255,255,.97);border:1px solid rgba(184,205,229,.8);box-shadow:var(--shadow);z-index:4;gap:6px}.menu.open{display:grid}
    .main{min-width:0;padding:20px 22px 22px;display:grid;gap:18px}.top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center}.hero,.cluster,.surface{border-radius:22px;background:rgba(255,255,255,.84);border:1px solid rgba(184,205,229,.74);box-shadow:var(--shadow)}
    .hero{min-height:72px;padding:18px 22px;display:flex;align-items:center}.hero h1{margin:0;font-size:22px;color:var(--head)}.hero p{margin:6px 0 0;font-size:13px;color:var(--muted)}.cluster{display:flex;align-items:center;gap:12px;padding:14px 16px}
    .dot{position:relative;width:14px;height:14px;border-radius:999px;background:var(--warn);box-shadow:0 0 0 4px rgba(240,185,76,.18)}.dot.ok{background:var(--ok);box-shadow:0 0 0 4px rgba(31,201,122,.16)}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad);box-shadow:0 0 0 4px rgba(239,109,116,.16)}.dot:after{content:attr(data-tip);position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;padding:7px 10px;border-radius:10px;background:#12314c;color:#eff7ff;font-size:12px;font-weight:700;opacity:0;pointer-events:none}.dot:hover:after,.dot:focus-visible:after{opacity:1}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:18px;align-items:start}.shell{display:grid;grid-template-rows:1fr auto;min-height:calc(100vh - 150px);overflow:hidden}.thread{padding:24px;overflow:auto;display:grid;gap:16px;align-content:start}
    .msg{display:grid;gap:10px}.msg.user{justify-items:end}.badge{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}.card{width:min(100%,900px);border-radius:22px;padding:18px 20px;background:#fff;border:1px solid rgba(184,205,229,.74)}.msg.user .card{width:fit-content;max-width:min(100%,760px);background:linear-gradient(180deg,rgba(11,120,209,.16),rgba(11,120,209,.08));border-color:rgba(11,120,209,.28)}.card h2,.card h3,.card h4,.title{margin:0 0 10px;color:var(--head)}
    .sum{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}.box{padding:12px 14px;border-radius:16px;background:var(--soft);border:1px solid rgba(11,120,209,.16)}.box strong{display:block;font-size:20px;color:var(--accent2);margin-bottom:4px}.box span{font-size:12px;font-weight:700;color:var(--muted)}
    .tableWrap{overflow:auto;border:1px solid rgba(184,205,229,.75);border-radius:18px;background:rgba(244,250,255,.82)}table{width:100%;border-collapse:collapse}th,td{padding:12px 14px;text-align:left;vertical-align:top;border-bottom:1px solid rgba(184,205,229,.7);font-size:13px}th{position:sticky;top:0;background:rgba(235,245,255,.97);color:var(--head);font-size:12px;text-transform:uppercase;letter-spacing:.05em}tr:last-child td{border-bottom:none}
    .rowBtn{display:block;width:100%;padding:0;border:none;background:transparent;color:inherit;text-align:inherit;cursor:pointer;font:inherit}.rowBtn strong{display:block;color:var(--head);margin-bottom:4px}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip,.pill{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid rgba(164,192,220,.9);background:rgba(237,246,255,.9);color:var(--accent2)}.pill.online{background:rgba(31,201,122,.15);color:#0f7a4b}.pill.limited{background:rgba(240,185,76,.15);color:#9b6a06}.pill.planned{background:rgba(11,120,209,.14);color:#0c5f9e}.pill.internal_only{background:rgba(239,109,116,.14);color:#a33139}.pill.deprecated{background:rgba(108,136,163,.14);color:#5c7388}
    .composer{padding:18px 20px 20px;border-top:1px solid rgba(184,205,229,.7);display:grid;gap:12px;background:rgba(250,253,255,.88)}.short{display:flex;gap:10px;flex-wrap:wrap}.mini{width:auto;padding:9px 12px;font-size:12px;font-weight:800;color:var(--accent2);background:rgba(217,239,255,.72);border-color:rgba(11,120,209,.16)}.compose{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;padding:12px;border-radius:20px;border:1px solid rgba(184,205,229,.85);background:#fff}textarea{width:100%;min-height:76px;resize:vertical;border:none;outline:none;background:transparent;color:var(--text);font:inherit;line-height:1.5}.primary{border:none;border-radius:14px;padding:12px 16px;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(180deg,#1594f0,#0a73cc);color:#fff;box-shadow:0 10px 24px rgba(15,125,209,.28)}
    .result{padding:18px;display:grid;gap:16px;align-content:start;min-height:calc(100vh - 150px)}.block{padding:16px;border-radius:18px;background:rgba(247,251,255,.96);border:1px solid rgba(184,205,229,.78)}.meta{display:grid;gap:10px}.item{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(184,205,229,.6);font-size:13px}.item:last-child{border-bottom:none;padding-bottom:0}.item span:first-child{color:var(--muted)}pre{margin:0;padding:14px;border-radius:16px;background:#12314c;color:#edf6ff;overflow:auto;font-size:12px;line-height:1.55;white-space:pre-wrap;word-break:break-word}.list{margin:0;padding-left:18px}.empty{color:var(--muted);font-size:13px}
    @media (max-width:1180px){.grid{grid-template-columns:1fr}.result{min-height:0}}@media (max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto;border-right:none;border-bottom:1px solid rgba(184,205,229,.75)}.top{grid-template-columns:1fr}.sum{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="logo"></div><b>AegisBroker</b></div>
      <div class="scroll">
        <section><div class="label">Conversation</div><div class="nav">
          <button class="active" id="navNewConversation" type="button">新對話</button>
          <button id="navCommodityCategories" type="button">商品分類</button>
          <button id="navRecentConversations" type="button">最近對話</button>
          <button id="navSavedQueries" type="button">已儲存查詢</button>
        </div></section>
        <section><div class="label">Workspace</div><div class="nav">
          <button id="navFormsService" type="button">表單服務</button>
          <button id="navProcessDocuments" type="button">流程文件</button>
          <button id="navOperationLogs" type="button">操作記錄</button>
          <button id="navAvailableServices" type="button">目前開放服務</button>
        </div></section>
      </div>
      <div class="footer">
        <div class="ver">v0.1.5 Baseline</div>
        <div class="user">
          <div class="avatar" id="userAvatar">AG</div>
          <div><div class="name" id="userName">訪客</div><div class="role" id="userRole">GUEST</div></div>
          <button class="toggle" id="userMenuToggle" type="button" aria-expanded="false">…</button>
          <div class="menu" id="userMenu">
            <button type="button" id="menuLoadProfileAction">載入個人資料</button>
            <button type="button" id="menuCopyWorkspaceAction">複製 Workspace ID</button>
            <button type="button" id="menuCopySessionAction">複製 Session Token</button>
            <button type="button" id="menuToggleAuthAction">登入</button>
          </div>
        </div>
      </div>
    </aside>
    <main class="main">
      <section class="top">
        <div class="hero"><div><h1>AegisBroker / BrokerAI</h1><p>對話主控台、內容服務、表單服務與服務供應狀態總覽。</p></div></div>
        <div class="cluster">
          <span class="dot warn" id="toolbarBackendStatus" tabindex="0" data-tip="Backend: checking"></span>
          <span class="dot warn" id="toolbarDatabaseStatus" tabindex="0" data-tip="Database: checking"></span>
          <span class="dot warn" id="toolbarSessionStatus" tabindex="0" data-tip="Login: waiting"></span>
        </div>
      </section>
      <div class="grid">
        <section class="shell surface">
          <div class="thread" id="chatThread"></div>
          <div class="composer">
            <div class="short">
              <button class="mini" id="shortcutAvailableServices" type="button">目前開放服務</button>
              <button class="mini" id="shortcutCommodityCategories" type="button">商品分類</button>
              <button class="mini" id="shortcutFormsService" type="button">表單服務</button>
            </div>
            <div class="compose">
              <textarea id="chatInput" placeholder="請輸入想查詢的商品、服務、表單或流程。例如：請列出目前開放服務與權限限制。"></textarea>
              <button class="primary" id="sendChatBtn" type="button">送出</button>
            </div>
          </div>
        </section>
        <aside class="result surface">
          <section class="block"><h3 class="title">結果詳情</h3><div id="resultDetail" class="empty">尚未選取結果。點選左側功能或送出查詢後，這裡會顯示結構化資訊。</div></section>
          <section class="block"><h3 class="title">系統資訊</h3><div class="meta">
            <div class="item"><span>Workspace ID</span><strong id="workspaceValue">00000000-0000-0000-0000-000000000001</strong></div>
            <div class="item"><span>Backend API</span><strong id="backendValue">-</strong></div>
            <div class="item"><span>Session Token</span><strong id="sessionValue">waiting</strong></div>
          </div></section>
          <section class="block"><h3 class="title">系統輸出</h3><pre id="output">-</pre></section>
        </aside>
      </div>
    </main>
  </div>
  <script src="/config.js"></script>
  <script>
    const runtimeConfig=window.__AEGIS_CONFIG__||{},DEFAULT_WORKSPACE_ID="00000000-0000-0000-0000-000000000001",LOCAL_STORAGE_SESSION_KEY="aegis.session_token",LOCAL_STORAGE_BACKEND_KEY="aegis.backend_url",HEALTH_POLL_INTERVAL_MS=3e4,$=id=>document.getElementById(id),chatThreadEl=$("chatThread"),chatInputEl=$("chatInput"),outputEl=$("output"),resultDetailEl=$("resultDetail"),workspaceValueEl=$("workspaceValue"),backendValueEl=$("backendValue"),sessionValueEl=$("sessionValue"),userNameEl=$("userName"),userRoleEl=$("userRole"),userAvatarEl=$("userAvatar"),userMenuEl=$("userMenu"),userMenuToggleEl=$("userMenuToggle"),toolbarBackendStatus=$("toolbarBackendStatus"),toolbarDatabaseStatus=$("toolbarDatabaseStatus"),toolbarSessionStatus=$("toolbarSessionStatus"),navButtons={newConversation:$("navNewConversation"),commodityCategories:$("navCommodityCategories"),recentConversations:$("navRecentConversations"),savedQueries:$("navSavedQueries"),formsService:$("navFormsService"),processDocuments:$("navProcessDocuments"),operationLogs:$("navOperationLogs"),availableServices:$("navAvailableServices")};let backend="",isLoggedIn=!1,pollTimer=null,activeServiceCatalog=[];
    const setActiveNav=k=>Object.entries(navButtons).forEach(([n,b])=>b&&b.classList.toggle("active",n===k));
    const currentConsoleBaseUrl=()=>location.origin&&location.protocol.startsWith("http")?location.origin:backend||"";
    const apiUrl=p=>`${currentConsoleBaseUrl()}${p.startsWith("/")?p:`/${p}`}`;
    const resolvedWorkspaceId=()=>workspaceValueEl.textContent.trim()||DEFAULT_WORKSPACE_ID;
    function persistSessionToken(t){const n=(t||"").trim();if(!n){localStorage.removeItem(LOCAL_STORAGE_SESSION_KEY);sessionValueEl.textContent="waiting";return}localStorage.setItem(LOCAL_STORAGE_SESSION_KEY,n);sessionValueEl.textContent=`${n.slice(0,8)}…${n.slice(-6)}`}
    const currentSessionToken=()=> (localStorage.getItem(LOCAL_STORAGE_SESSION_KEY)||"").trim();
    function authHeaders(){const t=currentSessionToken();if(!t)throw new Error("尚未取得 Session Token");return{Authorization:`Bearer ${t}`}}
    const normalizeBaseUrl=u=>(u||"").trim().replace(/\/$/,""),isHttpUrl=u=>/^https?:\/\//i.test(u||"");
    function resolveBackendBaseUrl(){const s=normalizeBaseUrl(localStorage.getItem(LOCAL_STORAGE_BACKEND_KEY)||"");if(isHttpUrl(s))return s;const c=normalizeBaseUrl(runtimeConfig.BACKEND_API_BASE_URL||"");if(isHttpUrl(c))return c;if(["localhost","127.0.0.1"].includes(location.hostname))return`${location.protocol}//${location.hostname}:8080`;return location.origin}
    const printOutput=p=>outputEl.textContent=typeof p==="string"?p:JSON.stringify(p,null,2);
    const parseBody=resp=>(resp.headers.get("content-type")||"").includes("application/json")?resp.json().catch(()=>({error_code:"INVALID_JSON_RESPONSE"})):resp.text().then(t=>({body_preview:t.slice(0,500)}));
    function setStatusDot(el,mode,tip){if(!el)return;el.classList.remove("ok","warn","bad");el.classList.add(mode||"warn");el.setAttribute("data-tip",tip);el.setAttribute("aria-label",tip);el.title=tip}
    function updateAvatar(label,url=""){if(url){userAvatarEl.innerHTML=`<img alt="avatar" src="${url}" />`;return}const s=(label||"AG").split(/[\s@._-]+/).filter(Boolean).slice(0,2).map(v=>v[0]).join("").toUpperCase()||"AG";userAvatarEl.textContent=s}
    function syncLoginState(next){isLoggedIn=next;$("menuToggleAuthAction").textContent=next?"登出":"登入";if(!next){userNameEl.textContent="訪客";userRoleEl.textContent="GUEST";updateAvatar("guest");setStatusDot(toolbarSessionStatus,"warn","Login: waiting");return}setStatusDot(toolbarSessionStatus,"ok","Login: active")}
    function appendMessage(role,content){const w=document.createElement("section");w.className=`msg ${role}`;const b=document.createElement("div");b.className="badge";b.textContent=role==="user"?"User":"BrokerAI";const c=document.createElement("div");c.className="card";if(typeof content==="string"){const p=document.createElement("p");p.textContent=content;c.appendChild(p)}else c.appendChild(content);w.appendChild(b);w.appendChild(c);chatThreadEl.appendChild(w);chatThreadEl.scrollTop=chatThreadEl.scrollHeight;return c}
    const clearThread=()=>chatThreadEl.innerHTML="";
    function setResultDetail(v){if(typeof v==="string"){resultDetailEl.innerHTML=v;return}resultDetailEl.innerHTML="";resultDetailEl.appendChild(v)}
    function summaryCard(label,value){const d=document.createElement("div");d.className="box";d.innerHTML=`<strong>${value}</strong><span>${label}</span>`;return d}
    function makeChipList(items,className="chip"){const d=document.createElement("div");d.className="chips";items.forEach(i=>{const s=document.createElement("span");s.className=className;s.textContent=i;d.appendChild(s)});return d}
    function renderServiceDetail(s){const d=document.createElement("div");d.innerHTML=`<h3 class="title">${s.service_name}</h3><p>${s.implementation_note}</p><div class="meta"><div class="item"><span>服務分類</span><strong>${s.service_category}</strong></div><div class="item"><span>目前狀態</span><strong>${s.service_status}</strong></div><div class="item"><span>使用入口</span><strong>${s.access_entry_point}</strong></div><div class="item"><span>預計時間</span><strong>${s.planned_availability||"已上線 / 持續供應"}</strong></div></div>`;const h1=document.createElement("h4");h1.textContent="支援角色";h1.style.marginTop="14px";d.appendChild(h1);d.appendChild(makeChipList(s.supported_roles));const h2=document.createElement("h4");h2.textContent="權限限制";h2.style.marginTop="14px";d.appendChild(h2);const ul=document.createElement("ul");ul.className="list";s.permission_restrictions.forEach(i=>{const li=document.createElement("li");li.textContent=i;ul.appendChild(li)});d.appendChild(ul);setResultDetail(d)}
    function renderServiceCatalogMessage(payload){const w=document.createElement("div"),p=document.createElement("p");p.textContent="以下為目前 AegisBroker 所有已上線與規劃中服務的單次快整查詢結果。可直接點選服務列查看角色、權限限制與預計時間。";w.appendChild(p);const s=document.createElement("div");s.className="sum";s.appendChild(summaryCard("已上線",payload.summary.online_count));s.appendChild(summaryCard("受限供應",payload.summary.limited_count));s.appendChild(summaryCard("規劃中",payload.summary.planned_count));s.appendChild(summaryCard("角色受限",payload.summary.role_restricted_count));w.appendChild(s);const wrap=document.createElement("div");wrap.className="tableWrap";const t=document.createElement("table");t.innerHTML='<thead><tr><th>服務</th><th>分類</th><th>角色</th><th>狀態</th><th>預計時間</th></tr></thead><tbody></tbody>';const body=t.querySelector("tbody");payload.services.forEach(service=>{const tr=document.createElement("tr"),c1=document.createElement("td"),btn=document.createElement("button");btn.className="rowBtn";btn.type="button";btn.dataset.serviceKey=service.service_key;btn.innerHTML=`<strong>${service.service_name}</strong><span>${service.implementation_note}</span>`;c1.appendChild(btn);const c2=document.createElement("td");c2.textContent=service.service_category;const c3=document.createElement("td");c3.appendChild(makeChipList(service.supported_roles));const c4=document.createElement("td"),pill=document.createElement("span");pill.className=`pill ${service.service_status}`;pill.textContent=service.service_status;c4.appendChild(pill);const c5=document.createElement("td");c5.textContent=service.planned_availability||"-";tr.append(c1,c2,c3,c4,c5);body.appendChild(tr)});wrap.appendChild(t);w.appendChild(wrap);w.addEventListener("click",e=>{const btn=e.target.closest(".rowBtn");if(!btn)return;const service=activeServiceCatalog.find(v=>v.service_key===btn.dataset.serviceKey);if(service)renderServiceDetail(service)});appendMessage("assistant",w)}
    function renderWelcome(){clearThread();appendMessage("assistant","我是 BrokerAI。你可以直接查詢商品分類、目前開放服務、表單服務、流程文件，或要求我整理某個市場的供應狀態。");const quick=document.createElement("div");quick.innerHTML='<h3>今天可以怎麼開始</h3><ul class="list"><li>查詢目前開放服務與角色限制</li><li>瀏覽商品分類與 Phase 1-3 上線規劃</li><li>查看表單服務與流程文件的供應方式</li><li>登入後同步你的 workspace 與 session 狀態</li></ul>';appendMessage("assistant",quick);setResultDetail("尚未選取結果。你可以先點左側「目前開放服務」，或直接在下方輸入想查詢的服務。")}
    const showCommodityCategories=()=>{const d=document.createElement("div");d.innerHTML='<h3>商品分類與推進階段</h3><p>BrokerAI 目前先依設計基線整理 Phase 1-3 商品路線，後續會接上 ontology 與 pricing feed 模組。</p><ul class="list"><li>Phase 1：原油、黃金、天然氣、小麥、咖啡</li><li>Phase 2：銅、大豆、糖、LNG</li><li>Phase 3：鋰（新能源）、碳權、電力</li></ul>';appendMessage("assistant",d);setResultDetail("<strong>商品分類</strong><p class=\"empty\">後續會接上 ontology、broker/trader/exchange mapping，以及 CME / ICE pricing feed 正規化結果。</p>")};
    const showRecentConversations=()=>{appendMessage("assistant","最近對話功能已納入 v0.1.5 基線，但目前先保留為對話索引殼層。下一階段會接上會話保存與查詢。");setResultDetail("<strong>最近對話</strong><p class=\"empty\">規劃中：會話索引、摘要、重新開啟、角色化可見性控制。</p>")};
    const showSavedQueries=()=>{appendMessage("assistant","已儲存查詢目前先保留為查詢工作流的承接點。後續會支援保存商品搜尋、服務矩陣與市場條件組合。");setResultDetail("<strong>已儲存查詢</strong><p class=\"empty\">規劃中：保存查詢條件、角色權限、快速重跑與分享控制。</p>")};
    const showFormsService=()=>{appendMessage("assistant","表單服務目前以 library 目錄中的傳統業務表單為基礎，已納入公開唯讀與後續受控提交的雙層設計。");setResultDetail("<strong>表單服務</strong><p class=\"empty\">目前支援文件型表單庫；後續會加入提交流程、下載授權、版本與事件軌跡。</p>")};
    const showProcessDocuments=()=>{appendMessage("assistant","流程文件會承接作業指南、流程文件與制度文件，未來會與 BrokerAI 的回應結果以及工作流卡片互相連動。");setResultDetail("<strong>流程文件</strong><p class=\"empty\">規劃中：流程文件清單、階段說明、責任角色、相關表單與操作入口。</p>")};
    const showOperationLogs=()=>{appendMessage("assistant","操作記錄模組目前仍在規劃階段，未來會將 trace、event 與 audit 結果整合成可讀查詢視圖。");setResultDetail("<strong>操作記錄</strong><p class=\"empty\">規劃中：事件索引、trace 關聯、權限門控與角色化可視範圍。</p>")};
    async function fetchServiceCatalog(source="nav"){try{const resp=await fetch(apiUrl("/v1/service-catalog")),body=await parseBody(resp);printOutput({source,status:resp.status,body});if(!resp.ok){appendMessage("assistant","目前開放服務查詢失敗，請稍後重試。");setResultDetail(`<strong>查詢失敗</strong><p class="empty">${body.message||"Service catalog unavailable"}</p>`);return}activeServiceCatalog=body.services||[];renderServiceCatalogMessage(body);if(activeServiceCatalog[0])renderServiceDetail(activeServiceCatalog[0])}catch(error){appendMessage("assistant","目前開放服務查詢失敗，系統無法連線到服務目錄。");setResultDetail(`<strong>查詢失敗</strong><p class="empty">${String(error)}</p>`);printOutput({error:String(error)})}}
    async function runHealthCheck(){try{const [liveResp,readyResp]=await Promise.all([fetch(apiUrl("/health/live")),fetch(apiUrl("/health/ready"))]);setStatusDot(toolbarBackendStatus,liveResp.ok?"ok":"bad",liveResp.ok?"Backend: healthy":"Backend: failed");setStatusDot(toolbarDatabaseStatus,readyResp.ok?"ok":"bad",readyResp.ok?"Database: ready":"Database: failed")}catch(error){setStatusDot(toolbarBackendStatus,"bad","Backend: failed");setStatusDot(toolbarDatabaseStatus,"bad","Database: failed");printOutput({error:String(error)})}}
    async function runSessionProbe(source="auto"){const token=currentSessionToken();if(!token){syncLoginState(false);return}try{const resp=await fetch(apiUrl("/v1/me/profile"),{headers:authHeaders()}),body=await parseBody(resp);if(!resp.ok){localStorage.removeItem(LOCAL_STORAGE_SESSION_KEY);sessionValueEl.textContent="waiting";syncLoginState(false);if(source!=="auto")printOutput({status:resp.status,body});return}isLoggedIn=!0;$("menuToggleAuthAction").textContent="登出";userNameEl.textContent=body.display_name||body.email||"workspace user";userRoleEl.textContent=body.roles&&body.roles[0]||"workspace_member";updateAvatar(body.display_name||body.email||"user",body.avatar_url||"");workspaceValueEl.textContent=body.workspace_id||resolvedWorkspaceId();setStatusDot(toolbarSessionStatus,"ok","Login: active");if(source!=="auto")printOutput({status:resp.status,body})}catch(error){setStatusDot(toolbarSessionStatus,"bad","Login: error");if(source!=="auto")printOutput({error:String(error)})}}
    const refreshSystemStatus=(source="auto")=>Promise.all([runHealthCheck(),runSessionProbe(source)]),schedulePolling=()=>{if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>refreshSystemStatus("auto"),HEALTH_POLL_INTERVAL_MS)};
    async function runOAuthStart(){try{const workspace=resolvedWorkspaceId(),resp=await fetch(apiUrl(`/auth/google/start?workspace_id=${encodeURIComponent(workspace)}`)),body=await parseBody(resp);printOutput({status:resp.status,body});if(resp.ok&&body.auth_url){window.location.assign(body.auth_url);return}appendMessage("assistant","登入流程無法啟動，請先確認 OAuth 設定或稍後重試。")}catch(error){appendMessage("assistant","登入流程無法啟動，系統目前無法連線。");printOutput({error:String(error)})}}
    async function consumeAuthCallbackState(){const rawHash=location.hash.startsWith("#")?location.hash.slice(1):location.hash,hashParams=new URLSearchParams(rawHash||""),searchParams=new URLSearchParams(location.search||""),authStatus=(hashParams.get("auth_status")||searchParams.get("auth_status")||"").trim();if(!authStatus)return!1;const sessionToken=(hashParams.get("session_token")||searchParams.get("session_token")||"").trim(),workspaceId=(hashParams.get("workspace_id")||searchParams.get("workspace_id")||"").trim(),expiresAt=(hashParams.get("expires_at")||searchParams.get("expires_at")||"").trim(),traceId=(hashParams.get("trace_id")||searchParams.get("trace_id")||"").trim(),errorCode=(hashParams.get("error_code")||searchParams.get("error_code")||"").trim(),message=(hashParams.get("message")||searchParams.get("message")||"").trim();history.replaceState(null,"",location.pathname);if(workspaceId)workspaceValueEl.textContent=workspaceId;if(authStatus==="success"&&sessionToken){persistSessionToken(sessionToken);appendMessage("assistant",`登入成功，已接手 Session Token，Workspace 為 ${workspaceId||resolvedWorkspaceId()}。`);printOutput({status:"oauth_callback_success",workspace_id:workspaceId||resolvedWorkspaceId(),expires_at:expiresAt,trace_id:traceId});await runSessionProbe("oauth_callback");return!0}appendMessage("assistant",`登入未完成：${message||errorCode||"OAuth callback failed"}`);printOutput({status:"oauth_callback_failed",error_code:errorCode||"OAUTH_CALLBACK_FAILED",message:message||"OAuth callback failed",trace_id:traceId});return!0}
    async function loadProfile(){try{const resp=await fetch(apiUrl("/v1/me/profile"),{headers:authHeaders()}),body=await parseBody(resp);printOutput({status:resp.status,body});if(!resp.ok){appendMessage("assistant","目前無法載入個人資料，Session 可能已失效。");return}await runSessionProbe("manual");setResultDetail(`<strong>個人資料</strong><p class="empty">使用者：${body.display_name||body.email}<br>角色：${(body.roles||[]).join(", ")||"workspace_member"}<br>語系：${body.locale||"zh-TW"}</p>`)}catch(error){printOutput({error:String(error)})}}
    async function copyText(text,label){if(!navigator.clipboard||!navigator.clipboard.writeText){printOutput({error:"Clipboard API unavailable"});return}await navigator.clipboard.writeText(text);printOutput({status:"copied",label,value:text})}
    const toggleUserMenu=()=>{const open=userMenuEl.classList.toggle("open");userMenuToggleEl.setAttribute("aria-expanded",open?"true":"false")},closeUserMenu=()=>{userMenuEl.classList.remove("open");userMenuToggleEl.setAttribute("aria-expanded","false")};
    function handleBrokerQuery(query){const trimmed=(query||"").trim();if(!trimmed)return;appendMessage("user",trimmed);const normalized=trimmed.toLowerCase();if(normalized.includes("目前開放服務")||normalized.includes("available service")||normalized.includes("service")){setActiveNav("availableServices");fetchServiceCatalog("chat");return}if(normalized.includes("商品")||normalized.includes("commodity")){setActiveNav("commodityCategories");showCommodityCategories();return}if(normalized.includes("表單")){setActiveNav("formsService");showFormsService();return}if(normalized.includes("流程")){setActiveNav("processDocuments");showProcessDocuments();return}appendMessage("assistant","BrokerAI 已收到查詢。這版基線先支援服務矩陣、商品分類、表單服務與流程文件引導；更深的市場查詢與交易模組會在後續掛接。")}
    function bindNav(button,key,handler){if(!button)return;button.addEventListener("click",async()=>{setActiveNav(key);await handler()})}
    bindNav(navButtons.newConversation,"newConversation",async()=>renderWelcome());bindNav(navButtons.commodityCategories,"commodityCategories",async()=>showCommodityCategories());bindNav(navButtons.recentConversations,"recentConversations",async()=>showRecentConversations());bindNav(navButtons.savedQueries,"savedQueries",async()=>showSavedQueries());bindNav(navButtons.formsService,"formsService",async()=>showFormsService());bindNav(navButtons.processDocuments,"processDocuments",async()=>showProcessDocuments());bindNav(navButtons.operationLogs,"operationLogs",async()=>showOperationLogs());bindNav(navButtons.availableServices,"availableServices",async()=>fetchServiceCatalog("nav"));
    $("shortcutAvailableServices").addEventListener("click",async()=>{setActiveNav("availableServices");await fetchServiceCatalog("shortcut")});$("shortcutCommodityCategories").addEventListener("click",async()=>{setActiveNav("commodityCategories");showCommodityCategories()});$("shortcutFormsService").addEventListener("click",async()=>{setActiveNav("formsService");showFormsService()});$("sendChatBtn").addEventListener("click",()=>{const value=chatInputEl.value;chatInputEl.value="";handleBrokerQuery(value)});chatInputEl.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();$("sendChatBtn").click()}});
    $("menuLoadProfileAction").addEventListener("click",async()=>{closeUserMenu();await loadProfile()});$("menuCopyWorkspaceAction").addEventListener("click",async()=>{closeUserMenu();await copyText(resolvedWorkspaceId(),"workspace_id")});$("menuCopySessionAction").addEventListener("click",async()=>{closeUserMenu();await copyText(currentSessionToken(),"session_token")});$("menuToggleAuthAction").addEventListener("click",async()=>{closeUserMenu();if(isLoggedIn){localStorage.removeItem(LOCAL_STORAGE_SESSION_KEY);sessionValueEl.textContent="waiting";syncLoginState(false);appendMessage("assistant","已登出，目前回到訪客唯讀模式。");return}await runOAuthStart()});
    userMenuToggleEl.addEventListener("click",e=>{e.stopPropagation();toggleUserMenu()});document.addEventListener("click",e=>{if(!userMenuEl.contains(e.target)&&e.target!==userMenuToggleEl)closeUserMenu()});
    async function bootstrap(){backend=resolveBackendBaseUrl();backendValueEl.textContent=backend;workspaceValueEl.textContent=DEFAULT_WORKSPACE_ID;persistSessionToken(localStorage.getItem(LOCAL_STORAGE_SESSION_KEY)||"");updateAvatar("guest");syncLoginState(false);renderWelcome();await consumeAuthCallbackState();await refreshSystemStatus("auto");schedulePolling()}
    bootstrap();
  </script>
</body>
</html>
