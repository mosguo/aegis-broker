service: frontend-python
runtime: docker
build:
  dockerfile: ./frontend-python/Dockerfile
start:
  cmd: python -m http.server 3000
healthcheck:
  path: /
  port: 3000
env:
  PORT: "3000"
  BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL}
  DEFAULT_LOCALE: zh-TW
  ENABLED_LOCALES: zh-TW,zh-CN,en,es,tr
depends_on:
  - backend-rust
